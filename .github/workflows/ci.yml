name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Test ingestion-api
        working-directory: ingestion-api
        run: npm install && npm test || echo "No tests yet"
      - name: Test stream-processor
        working-directory: stream-processor
        run: npm install && npm test || echo "No tests yet"

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ./ingestion-api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ingestion-api:${{ github.sha }}
      - uses: docker/build-push-action@v5
        with:
          context: ./stream-processor
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/stream-processor:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v3
      - name: Deploy to K8s
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl set image deployment/ingestion-api \
            ingestion-api=${{ secrets.DOCKER_USERNAME }}/ingestion-api:${{ github.sha }}
          kubectl rollout status deployment/ingestion-api
