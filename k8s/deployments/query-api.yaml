apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-api
  labels:
    app: query-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-api
  template:
    metadata:
      labels:
        app: query-api
    spec:
      containers:
        - name: query-api
          image: query-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4001
          env:
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: observability-config
                  key: REDIS_URL
            - name: INFLUX_URL
              valueFrom:
                configMapKeyRef:
                  name: observability-config
                  key: INFLUX_URL
            - name: INFLUX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: observability-secrets
                  key: influx-token
            - name: INFLUX_ORG
              valueFrom:
                configMapKeyRef:
                  name: observability-config
                  key: INFLUX_ORG
            - name: INFLUX_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: observability-config
                  key: INFLUX_BUCKET
            - name: ELASTICSEARCH_URL
              valueFrom:
                configMapKeyRef:
                  name: observability-config
                  key: ELASTICSEARCH_URL
            - name: POSTGRES_URL
              valueFrom:
                configMapKeyRef:
                  name: observability-config
                  key: POSTGRES_URL
            - name: QUERY_API_PORT
              valueFrom:
                configMapKeyRef:
                  name: observability-config
                  key: QUERY_API_PORT
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: query-api
spec:
  selector:
    app: query-api
  ports:
    - port: 4001
      targetPort: 4001
  type: ClusterIP
