server {
    listen 80;

    # ── Serve React app ──────────────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # This makes React Router work — unknown paths serve index.html
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy REST API calls to query-api ────────────────────────────────────
    # In local dev, React uses "proxy" in package.json
    # In Docker, nginx handles this instead
    location /v1/ {
        proxy_pass http://query-api:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Proxy WebSocket for live logs ────────────────────────────────────────
    location /ws/ {
        proxy_pass http://query-api:4001;
        proxy_http_version 1.1;
        # These two headers are required for WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}